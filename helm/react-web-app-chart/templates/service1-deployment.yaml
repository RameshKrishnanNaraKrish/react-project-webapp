apiVersion: apps/v1
kind: Deployment
metadata:
  name: service1
  labels:
    app: service1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: service1
  template:
    metadata:
      labels:
        app: service1
    spec:
      containers:
      - name: service1
        image: rameshkrishnannarakrish/reactprojectwebapp_service1:{{ .Values.image.service1.tag }}
        ports:
        - containerPort: {{ .Values.service.service1.targetPort }}
        env:
            - name: API_BASE_URL
              value: "{{ .Values.env.API_BASE_URL }}"
            - name: PORT
              value: "{{ .Values.service.service1.port }}"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db_host
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db_user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db_password
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: db_name
        livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.service1.port }}
        readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.service.service1.port }}
